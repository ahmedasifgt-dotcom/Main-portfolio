<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Time Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-bg { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen p-5">

    <header class="text-center mb-8">
        <h2 class="text-3xl font-bold">নামাজের সময়সূচী</h2>
        <select id="city-select" class="mt-4 bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 text-white w-full max-w-xs">
            <option value="Dhaka">ঢাকা</option>
            <option value="Chittagong">চট্টগ্রাম</option>
            <option value="Sylhet">সিলেট</option>
        </select>
    </header>

    <div id="prayer-cards" class="grid grid-cols-1 gap-4 max-w-lg mx-auto">
        <p class="text-center">লোড হচ্ছে...</p>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-4 z-50">
        <div class="glass-bg border border-white/20 p-8 rounded-3xl text-center w-full max-w-xs">
            <h3 class="text-xl font-bold">মসজিদে জামাত</h3>
            <p id="jamat-time" class="text-3xl font-bold my-4"></p>
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="bg-white/20 px-6 py-2 rounded-full">Back</button>
        </div>
    </div>

    <script>
        const prayers = [
            { name: 'ফজর', api: 'Fajr', jamat: '৪:৪৫' },
            { name: 'যোহর', api: 'Dhuhr', jamat: '১:১৫' },
            { name: 'আসর', api: 'Asr', jamat: '৫:১৫' },
            { name: 'মাগরিব', api: 'Maghrib', jamat: '৭:০৫' },
            { name: 'এশা', api: 'Isha', jamat: '৮:৪৫' }
        ];

        async function fetchTimes(city) {
            const container = document.getElementById('prayer-cards');
            container.innerHTML = '<p class="text-center">লোড হচ্ছে...</p>';
            try {
                const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Bangladesh&method=2`);
                const d = await res.json();
                container.innerHTML = '';
                prayers.forEach(p => {
                    container.innerHTML += `
                        <div class="glass-bg p-6 rounded-2xl border border-white/10 flex justify-between items-center">
                            <div>
                                <h3 class="text-xl font-bold">${p.name}</h3>
                                <p class="text-2xl font-bold text-sky-400">${d.data.timings[p.api]}</p>
                            </div>
                            <button onclick="document.getElementById('modal').classList.remove('hidden'); document.getElementById('jamat-time').innerText='${p.jamat}'" class="text-sm bg-white/10 px-4 py-2 rounded-lg">Show More</button>
                        </div>
                    `;
                });
            } catch(e) { container.innerHTML = '<p class="text-center text-red-400">নেটওয়ার্ক সমস্যা!</p>'; }
        }

        document.getElementById('city-select').onchange = (e) => fetchTimes(e.target.value);
        fetchTimes('Dhaka');
    </script>
</body>
</html>
