<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Time Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', 'Hind Siliguri', sans-serif; }
        .text-stroke { -webkit-text-stroke: 1px rgba(0,0,0,0.5); }
        .bg-blur-custom::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url(https://share.google/LuLUPXp65iO3qbMNS);
            background-size: cover;
            filter: blur(8px) brightness(0.6);
            z-index: -1;
        }
    </style>
</head>
<body class="bg-blur-custom min-h-screen text-white flex flex-col items-center py-10">

    <header class="text-center mb-6">
        <h1 id="greeting" class="text-2xl font-light text-white/90">শুভ দুপুর</h1>
        <h2 class="text-4xl font-bold tracking-wide">নামাজের সময়সূচী</h2>
        <p id="current-date" class="text-lg font-semibold mt-2 text-white/80"></p>
    </header>

    <!-- Location Selector (ফিরে এসেছে) -->
    <div class="mb-8 w-full max-w-xs">
        <select id="city-select" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-sky-300 backdrop-blur-md cursor-pointer">
            <option value="Dhaka" class="text-blue-950">ঢাকা (Dhaka)</option>
            <option value="Chittagong" class="text-blue-950">চট্টগ্রাম (Chittagong)</option>
            <option value="Sylhet" class="text-blue-950">সিলেট (Sylhet)</option>
            <option value="Rajshahi" class="text-blue-950">রাজশাহী (Rajshahi)</option>
            <option value="Khulna" class="text-blue-950">খুলনা (Khulna)</option>
        </select>
    </div>

    <div id="prayer-cards" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 px-4 w-full max-w-5xl">
        <!-- কার্ডগুলো জাভাস্ক্রিপ্ট দিয়ে তৈরি হবে -->
    </div>

    <!-- পপ-আপ মোডাল -->
    <div id="modal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-3xl text-center w-full max-w-sm">
            <h3 class="text-2xl font-bold mb-2">মসজিদে জামাত</h3>
            <p id="jamat-time" class="text-4xl font-extrabold mb-6"></p>
            <button onclick="closeModal()" class="bg-white/20 px-6 py-2 rounded-full hover:bg-white/30">Back</button>
        </div>
    </div>

    <script>
        const prayerData = [
            { name: 'ফজর', jamat: '৪:৪৫' },
            { name: 'যোহর', jamat: '১:১৫' },
            { name: 'আসর', jamat: '৫:১৫' },
            { name: 'মাগরিব', jamat: '৭:০৫' },
            { name: 'এশা', jamat: '৮:৪৫' }
        ];

        // বাকি জাভাস্ক্রিপ্ট লজিক আগের মতই থাকবে...
        // শুধু city-select পরিবর্তন করলে fetchPrayerTimes ফাংশনটি কল করবেন।
        
        document.getElementById('city-select').addEventListener('change', (e) => {
            console.log("শহর পরিবর্তিত হয়েছে:", e.target.value);
            // এখানে আপনি API কল করে সময় আপডেট করার লজিক বসাবেন
        });
    </script>
</body>
</html>
